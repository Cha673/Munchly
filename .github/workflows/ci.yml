name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.0
        env:
          MARIADB_ROOT_PASSWORD: ${{ secrets.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: uber_eats_test
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    # Indique qu'il faut lancer les commandes npm dans le dossier de l'API
    defaults:
      run:
        working-directory: ./boilerplate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "./boilerplate/package-lock.json"

      - name: Wait for MariaDB
        run: |
          until mysql -h 127.0.0.1 -u root -p${{ secrets.MARIADB_ROOT_PASSWORD }} -e "SELECT 1;" > /dev/null 2>&1; do
            echo "Waiting for MariaDB..."
            sleep 2
          done

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Run tests
        # On ajoute --if-present pour ne pas planter si "npm test" n'est pas configuré
        run: npm test --if-present

      - name: Log in to GHCR
        uses: docker/login-action@v3
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' )
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main')
        with:
          context: ./boilerplate
          file: ./boilerplate/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
